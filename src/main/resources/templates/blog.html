<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{minimal-header :: minimal-header('Blog', ~{::section})}">
<section>
  <div class="blog-hero">
    <img th:if="${page.profileImageUrl != null && !#strings.isEmpty(page.profileImageUrl)}"
         th:src="${page.profileImageUrl}"
         th:alt="${page.authorName}"
         class="blog-avatar"/>

    <div class="blog-hero-meta">
      <h1 th:text="${page.authorName}">Gabriel Marvin</h1>
      <p th:text="${page.authorSubtitle}">Engineer · Builder · Writer</p>
    </div>
  </div>

  <div class="rich-content" th:utext="${page.richHtml}"></div>
</section>
</html>
