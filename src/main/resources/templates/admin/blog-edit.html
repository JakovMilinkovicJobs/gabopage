<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{minimal-header :: minimal-header('Edit Blog', ~{::section})}">
<section>


  <div class="mb-6">
    <h1 class="text-3xl font-bold">Edit Blog</h1>
    <p class="text-gray-600">Update your profile summary and blog content.</p>
  </div>

  <form th:action="@{/admin/blog/edit}" method="post" enctype="multipart/form-data" class="space-y-4">
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label for="authorName" class="block text-sm font-medium mb-1">Author Name</label>
        <input id="authorName" name="authorName" type="text" th:value="${page.authorName}" required
               class="w-full rounded-lg border border-gray-300 px-3 py-2"/>
      </div>
      <div>
        <label for="authorSubtitle" class="block text-sm font-medium mb-1">Subtitle</label>
        <input id="authorSubtitle" name="authorSubtitle" type="text" th:value="${page.authorSubtitle}"
               placeholder="Engineer · Builder · Writer"
               class="w-full rounded-lg border border-gray-300 px-3 py-2"/>
      </div>
    </div>

    <div>
      <label for="profileImage" class="block text-sm font-medium mb-1">Profile Image</label>
      <input id="profileImage" name="profileImage" type="file" accept="image/*"
             class="w-full rounded-lg border border-gray-300 px-3 py-2"/>
      <p class="text-sm text-gray-500 mt-1">Leave empty to keep your current image.</p>
      <img th:if="${page.profileImageUrl != null && !#strings.isEmpty(page.profileImageUrl)}"
           th:src="${page.profileImageUrl}" alt="Current profile image"
           class="mt-3 h-20 w-20 rounded-full object-cover border"/>
    </div>

    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{/blog}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        Save
      </button>
    </div>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div id="editor" class="border rounded-xl min-h-[520px] bg-white"></div>

    <label for="richHtml"></label><textarea name="richHtml" id="richHtml" class="hidden" th:text="${page.richHtml}"></textarea>


  </form>
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

  <script>
      const quill = new Quill('#editor', {
          theme: 'snow'
      });

      quill.root.classList.add('rich-content');

      const initial = document.getElementById('richHtml').value;
      if (initial) quill.root.innerHTML = initial;

      document.querySelector('form').addEventListener('submit', () => {
          document.getElementById('richHtml').value = quill.root.innerHTML;
      });
  </script>

</section>
</html>
