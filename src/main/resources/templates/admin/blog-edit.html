<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Edit Blog', ~{::section})}">
<section>
  <div class="mb-6">
    <h1 class="text-3xl font-bold">Edit Blog</h1>
    <p class="text-gray-600">Update text and profile photo shown on the blog page.</p>
  </div>

  <form th:action="@{/admin/blog/edit}" method="post" enctype="multipart/form-data" class="space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="profile-editor-card">
      <div class="profile-preview">
        <img th:if="${page.profileImage != null}"
             th:src="@{/blog/profile-image}"
             alt="Current profile photo"
             id="profilePreviewImage"
             class="profile-avatar" />
        <div th:if="${page.profileImage == null}" id="profilePreviewFallback" class="profile-avatar-fallback">GM</div>
      </div>

      <div class="space-y-3">
        <label for="profileImage" class="block text-sm font-semibold">Profile picture</label>
        <input id="profileImage"
               type="file"
               name="profileImage"
               accept="image/*"
               class="block w-full text-sm text-gray-700 file:mr-3 file:rounded-lg file:border-0 file:bg-black file:px-4 file:py-2 file:text-white hover:file:bg-gray-800" />

        <label class="inline-flex items-center gap-2 text-sm text-gray-700" th:if="${page.profileImage != null}">
          <input type="checkbox" name="removeProfileImage" value="true" class="rounded border-gray-300" />
          Remove current profile picture
        </label>
      </div>
    </div>

    <div id="editor" class="border rounded-xl min-h-[520px] bg-white"></div>
    <textarea name="richHtml" id="richHtml" class="hidden" th:text="${page.richHtml}"></textarea>

    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{/blog}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
        Save
      </button>
    </div>
  </form>

  <!-- Quill Editor Resources -->
  <div th:replace="~{shared/fragments/quill-editor :: quill-resources}"></div>

  <!-- Quill Editor Initialization -->
  <script th:replace="~{shared/fragments/quill-editor :: quill-script}"></script>

  <script>
      const profileInput = document.getElementById('profileImage');
      const existingImage = document.getElementById('profilePreviewImage');
      const existingFallback = document.getElementById('profilePreviewFallback');

      profileInput.addEventListener('change', (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) {
              return;
          }

          const objectUrl = URL.createObjectURL(file);

          if (existingImage) {
              existingImage.src = objectUrl;
              return;
          }

          if (existingFallback) {
              const img = document.createElement('img');
              img.className = 'profile-avatar';
              img.id = 'profilePreviewImage';
              img.alt = 'Profile preview';
              img.src = objectUrl;
              existingFallback.replaceWith(img);
          }
      });
  </script>
</section>
</html>
