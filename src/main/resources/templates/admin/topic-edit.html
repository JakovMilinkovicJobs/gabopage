<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{minimal-header :: minimal-header(${topic.id != null ? 'Edit Topic' : 'New Topic'}, ~{::section})}">
<section>
  <div class="mb-6">
    <h1 class="text-3xl font-bold" th:text="${topic.id != null ? 'Edit Topic' : 'New Topic'}">Edit Topic</h1>
    <p class="text-gray-600">Update topic information and content.</p>
  </div>

  <form th:action="${topic.id != null ? '/blog/topics/' + topic.id + '/edit' : '/blog/topics/new'}"
        method="post"
        enctype="multipart/form-data"
        class="space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label for="title" class="block text-sm font-semibold mb-2">Title</label>
      <input type="text"
             id="title"
             name="title"
             th:value="${topic.title}"
             required
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />
    </div>

    <div>
      <label for="description" class="block text-sm font-semibold mb-2">Description</label>
      <textarea id="description"
                name="description"
                rows="3"
                th:text="${topic.description}"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black"></textarea>
    </div>

    <div class="profile-editor-card">
      <div class="profile-preview" th:if="${topic.id != null && topic.coverImage != null}">
        <img th:src="@{/blog/topics/{id}/cover-image(id=${topic.id})}"
             alt="Current cover image"
             id="coverPreviewImage"
             class="w-full h-48 object-cover rounded" />
      </div>

      <div class="space-y-3">
        <label for="coverImage" class="block text-sm font-semibold">Cover Image</label>
        <input id="coverImage"
               type="file"
               name="coverImage"
               accept="image/*"
               class="block w-full text-sm text-gray-700 file:mr-3 file:rounded-lg file:border-0 file:bg-black file:px-4 file:py-2 file:text-white hover:file:bg-gray-800" />

        <label class="inline-flex items-center gap-2 text-sm text-gray-700" th:if="${topic.id != null && topic.coverImage != null}">
          <input type="checkbox" name="removeCoverImage" value="true" class="rounded border-gray-300" />
          Remove current cover image
        </label>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Content</label>
      <div id="editor" class="border rounded-xl min-h-[520px] bg-white"></div>
      <textarea name="richHtml" id="richHtml" class="hidden" th:text="${topic.richHtml}"></textarea>
    </div>

    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{/blog/edit/topics}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
        Save
      </button>
    </div>
  </form>

  <!-- Quill Editor Resources -->
  <div th:replace="~{fragments/quill-editor :: quill-resources}"></div>

  <!-- Quill Editor Initialization -->
  <script th:replace="~{fragments/quill-editor :: quill-script}"></script>

  <script>
      const coverInput = document.getElementById('coverImage');
      const existingImage = document.getElementById('coverPreviewImage');

      coverInput.addEventListener('change', (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) {
              return;
          }

          const objectUrl = URL.createObjectURL(file);

          if (existingImage) {
              existingImage.src = objectUrl;
          } else {
              const preview = document.createElement('div');
              preview.className = 'profile-preview mb-3';
              preview.innerHTML = `<img src="${objectUrl}" alt="Cover preview" id="coverPreviewImage" class="w-full h-48 object-cover rounded" />`;
              coverInput.parentElement.parentElement.insertBefore(preview, coverInput.parentElement);
          }
      });
  </script>
</section>
</html>
