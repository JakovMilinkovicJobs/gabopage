<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header(${publication.id != null ? 'Edit Publication' : 'New Publication'}, ~{::section})}">
<section>
  <div class="mb-6">
    <h1 class="text-3xl font-bold" th:text="${publication.id != null ? 'Edit Publication' : 'New Publication'}">Edit Publication</h1>
    <p class="text-gray-600">Update publication information.</p>
  </div>

  <form th:action="${publication.id != null ? '/admin/publications/' + publication.id + '/edit' : '/admin/publications/new'}"
        method="post"
        class="space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label for="title" class="block text-sm font-semibold mb-2">Title</label>
      <input type="text"
             id="title"
             name="title"
             th:value="${publication.title}"
             required
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />
    </div>

    <div>
      <label for="url" class="block text-sm font-semibold mb-2">URL</label>
      <input type="url"
             id="url"
             name="url"
             th:value="${publication.url}"
             required
             placeholder="https://example.com"
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />
      <p class="text-xs text-gray-500 mt-1">Enter the full URL including https://</p>
    </div>

    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{/admin/publications/list}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
        Save
      </button>
    </div>
  </form>
</section>
</html>
