<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Login', ~{::section})}">
<section class="flex items-center justify-center min-h-[70vh]">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-6">
      Admin Login
    </h1>

    <!-- Error message -->
    <div th:if="${param.error}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm">
      Invalid username or password.
    </div>

    <!-- Logout message -->
    <div th:if="${param.logout}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 text-sm">
      You have been logged out.
    </div>

    <!-- Success message -->
    <div th:if="${message}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 text-sm"
         th:text="${message}">
    </div>

    <form th:action="@{/gabo-secure-admin-2024}" method="post" class="space-y-5">

      <div>
        <label class="block text-sm font-medium mb-1">
          Username
        </label>
        <input type="text"
               name="username"
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
               required />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Password
        </label>
        <input type="password"
               name="password"
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
               required />
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Login
      </button>

      <div class="text-center">
        <a th:href="@{/gabo-secure-admin-2024/forgot-password}"
           class="text-sm text-blue-600 hover:underline">
          Forgot Password?
        </a>
      </div>

    </form>

  </div>

</section>
</html>
