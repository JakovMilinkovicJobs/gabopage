<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Reset Password', ~{::section})}">
<section class="flex items-center justify-center min-h-[70vh]">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-6">
      Set New Password
    </h1>

    <!-- Error message -->
    <div th:if="${error}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm"
         th:text="${error}">
    </div>

    <form th:action="@{/gabo-secure-admin-2024/reset-password}" method="post" class="space-y-5">

      <input type="hidden" name="token" th:value="${token}" />

      <div>
        <label class="block text-sm font-medium mb-1">
          New Password
        </label>
        <input type="password"
               name="password"
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
               required
               minlength="6" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Confirm Password
        </label>
        <input type="password"
               name="confirmPassword"
               class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
               required
               minlength="6" />
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Reset Password
      </button>

    </form>

  </div>

</section>
</html>
