<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Manage Links', ~{::section})}">
<section>
  <div class="mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold">Manage Links</h1>
      <p class="text-gray-600">Create, edit, and delete links.</p>
    </div>
    <a th:href="@{/admin/links/new}" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
      + New Link
    </a>
  </div>

  <div th:if="${linksPage.content.isEmpty()}" class="text-center py-12 text-gray-500">
    <p>No links yet. Create your first link!</p>
  </div>

  <div th:if="${!linksPage.content.isEmpty()}" class="space-y-4">
    <div th:each="link : ${linksPage.content}" class="border rounded-lg p-4 hover:bg-gray-50 flex justify-between items-start">
      <div class="flex-1 min-w-0">
        <a th:href="${link.url}"
           th:text="${link.url}"
           class="font-semibold text-lg break-all hover:underline"
           target="_blank"
           rel="noopener noreferrer">https://example.com</a>
        <p th:if="${link.description != null and !#strings.isEmpty(link.description)}"
           th:text="${link.description}"
           class="text-sm text-gray-400 mt-1">Short description</p>
        <p class="text-gray-400 text-xs mt-2">
          Created: <span th:text="${#temporals.format(link.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>
          <span th:if="${link.updatedAt != null}">
            | Updated: <span th:text="${#temporals.format(link.updatedAt, 'MMM dd, yyyy')}">Jan 02, 2024</span>
          </span>
        </p>
      </div>
      <div class="flex gap-2 ml-4">
        <a th:href="${link.url}" class="px-3 py-1 rounded border hover:bg-gray-100 text-sm" target="_blank" rel="noopener noreferrer">
          View
        </a>
        <a th:href="@{/admin/links/{id}/edit(id=${link.id})}" class="px-3 py-1 rounded border hover:bg-gray-100 text-sm">
          Edit
        </a>
        <form th:action="@{/admin/links/{id}/delete(id=${link.id})}" method="post" class="inline" onsubmit="return confirm('Are you sure you want to delete this link?');">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="px-3 py-1 rounded border border-red-300 text-red-600 hover:bg-red-50 text-sm">
            Delete
          </button>
        </form>
      </div>
    </div>
  </div>

  <div th:if="${linksPage.totalPages > 1}" class="mt-6 flex justify-center gap-2">
    <a th:if="${linksPage.number > 0}"
       th:href="@{/admin/links/list(page=${linksPage.number - 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Previous
    </a>
    <span class="px-4 py-2">
      Page <span th:text="${linksPage.number + 1}">1</span> of <span th:text="${linksPage.totalPages}">1</span>
    </span>
    <a th:if="${linksPage.hasNext()}"
       th:href="@{/admin/links/list(page=${linksPage.number + 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Next
    </a>
  </div>
</section>
</html>
