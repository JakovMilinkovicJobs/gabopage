<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="projectForm(project, formAction, submitLabel, cancelUrl)">

  <form th:action="@{${formAction}}"
        th:object="${project}"
        method="post"
        enctype="multipart/form-data"
        class="space-y-6">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <!-- Title -->
    <div>
      <label class="block text-sm font-medium mb-1">Title</label>
      <input type="text" th:field="*{title}"
             class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
             required />
    </div>

    <!-- Short Description -->
    <div>
      <label class="block text-sm font-medium mb-1">Short Description</label>
      <input type="text" th:field="*{shortDescription}"
             class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
             required />
    </div>

    <!-- Image URL -->
    <div>
      <label class="block text-sm font-medium mb-1">Image URL</label>
      <input type="url" th:field="*{imageUrl}"
             class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
             placeholder="https://..." />
    </div>

    <!-- Created At -->
    <div>
      <label class="block text-sm font-medium mb-1">Created At</label>
      <input type="date" th:field="*{createdAt}"
             class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <!-- Content -->
    <div>
      <label class="block text-sm font-medium mb-1">Content</label>
      <label>
<textarea th:field="*{content}" rows="10"
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Write the full project content..."></textarea>
      </label>
    </div>

    <!-- Visible editor -->
    <div id="editor" class="bg-white border rounded-xl min-h-[320px] p-3"></div>

    <!-- Submitted field -->
    <label for="richContentHtml"></label><textarea name="richContentHtml" id="richContentHtml" class="hidden"
                                                   th:text="${project.richContentHtml}"></textarea>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet"/>

    <script>
        const quill = new Quill('#editor', { theme: 'snow' });

        // load existing html on edit
        const initial = document.getElementById('richContentHtml').value;
        if (initial) quill.root.innerHTML = initial;

        // before submit, copy html into textarea
        document.querySelector('form').addEventListener('submit', () => {
            document.getElementById('richContentHtml').value = quill.root.innerHTML;
        });
    </script>

    <!-- Files section -->
    <div class="pt-2">
      <div class="flex items-end justify-between mb-2">
        <div>
          <h3 class="text-lg font-semibold">Files</h3>
          <p class="text-sm text-gray-600">Existing files + add new ones (saved when you press the button).</p>
        </div>
      </div>

      <!-- Existing files (scroll) -->
      <div class="border rounded-lg bg-white">
        <div class="px-4 py-3 border-b bg-gray-50 text-sm font-medium">
          Already uploaded
        </div>

        <div class="max-h-48 overflow-y-auto">
          <div th:if="${#lists.isEmpty(project.files)}" class="px-4 py-4 text-sm text-gray-500">
            No files uploaded yet.
          </div>

          <div th:each="f : ${project.files}" class="px-4 py-3 border-t flex items-center justify-between gap-3">
            <div class="min-w-0">
              <div class="font-medium truncate" th:text="${f.originalFilename}">file.pdf</div>
              <div class="text-xs text-gray-500 truncate"
                   th:text="${f.contentType} + ' • ' + ${f.size} + ' bytes'">
                application/pdf • 123 bytes
              </div>
            </div>

            <div class="flex gap-2 shrink-0">
              <a class="px-3 py-1 rounded border hover:bg-gray-50"
                 th:href="@{/files/{id}/view(id=${f.id})}" target="_blank">
                View
              </a>
              <a class="px-3 py-1 rounded border hover:bg-gray-50"
                 th:href="@{/files/{id}/download(id=${f.id})}">
                Download
              </a>

              <!-- Optional: allow delete existing files during edit -->
              <form th:action="@{/admin/files/{id}/delete(id=${f.id})}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit"
                        class="px-3 py-1 rounded bg-red-600 text-white hover:bg-red-700"
                        onclick="return confirm('Delete this file?')">
                  Delete
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Drag & drop upload (saved on submit) -->
      <div class="mt-4">
        <label class="block text-sm font-medium mb-1">Add files</label>

        <div id="dropzone"
             class="border-2 border-dashed rounded-xl p-6 bg-gray-50 text-center cursor-pointer hover:bg-gray-100 transition">
          <div class="text-sm text-gray-700">
            Drag & drop files here, or <span class="underline">click to choose</span>
          </div>
          <div class="text-xs text-gray-500 mt-1">
            Files are uploaded when you click <span class="font-semibold" th:text="${submitLabel}">Save</span>.
          </div>

          <input id="fileInput" type="file" name="newFiles" multiple class="hidden"/>
        </div>

        <!-- Selected files preview -->
        <div id="selectedFiles" class="mt-3 text-sm text-gray-700"></div>

        <script>
            (function () {
                const dz = document.getElementById('dropzone');
                const input = document.getElementById('fileInput');
                const out = document.getElementById('selectedFiles');

                function renderSelected() {
                    if (!input.files || input.files.length === 0) {
                        out.innerHTML = '<div class="text-gray-500">No new files selected.</div>';
                        return;
                    }
                    const items = Array.from(input.files).map(f =>
                        `<div class="flex justify-between border rounded px-3 py-2 bg-white mb-2">
                   <div class="truncate">${f.name}</div>
                   <div class="text-gray-500 ml-3 shrink-0">${f.size} bytes</div>
                 </div>`
                    ).join('');
                    out.innerHTML = items;
                }

                dz.addEventListener('click', () => input.click());

                ['dragenter','dragover'].forEach(evt => {
                    dz.addEventListener(evt, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.add('bg-gray-100');
                    });
                });

                ['dragleave','drop'].forEach(evt => {
                    dz.addEventListener(evt, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.remove('bg-gray-100');
                    });
                });

                dz.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files && files.length) {
                        input.files = files; // replaces current selection (simple + reliable)
                        renderSelected();
                    }
                });

                input.addEventListener('change', renderSelected);
                renderSelected();
            })();
        </script>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{${cancelUrl}}"
         class="px-4 py-2 rounded-lg border hover:bg-gray-50">
        Cancel
      </a>

      <button type="submit"
              class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700"
              th:text="${submitLabel}">
        Save
      </button>
    </div>

  </form>
</div>

</body>
</html>
