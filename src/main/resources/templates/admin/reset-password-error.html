<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Reset Password Error', ~{::section})}">
<section class="flex items-center justify-center min-h-[70vh]">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-6 text-red-600">
      Reset Link Invalid
    </h1>

    <div class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm text-center">
      This password reset link is invalid or has expired.
    </div>

    <p class="text-sm text-gray-600 mb-6 text-center">
      Password reset links expire after 1 hour. Please request a new reset link.
    </p>

    <div class="text-center space-y-3">
      <a th:href="@{/gabo-secure-admin-2024/forgot-password}"
         class="block w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Request New Reset Link
      </a>
      <a th:href="@{/gabo-secure-admin-2024}"
         class="block text-sm text-blue-600 hover:underline">
        Back to Login
      </a>
    </div>

  </div>

</section>
</html>
