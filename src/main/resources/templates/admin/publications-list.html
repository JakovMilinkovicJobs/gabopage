<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Manage Publications', ~{::section})}">
<section>
  <div class="mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold">Manage Publications</h1>
      <p class="text-gray-600">Create, edit, and delete publications.</p>
    </div>
    <a th:href="@{/admin/publications/new}" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
      + New Publication
    </a>
  </div>

  <div th:if="${publicationsPage.content.isEmpty()}" class="text-center py-12 text-gray-500">
    <p>No publications yet. Create your first publication!</p>
  </div>

  <div th:if="${!publicationsPage.content.isEmpty()}" class="space-y-4">
    <div th:each="publication : ${publicationsPage.content}" class="border rounded-lg p-4 hover:bg-gray-50 flex justify-between items-start">
      <div class="flex-1">
        <h3 class="font-semibold text-lg" th:text="${publication.title}">Publication Title</h3>
        <p class="text-gray-600 text-sm mt-1 break-all" th:text="${publication.url}">URL</p>
        <p class="text-gray-400 text-xs mt-2">
          Created: <span th:text="${#temporals.format(publication.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>
          <span th:if="${publication.updatedAt != null}">
            • Updated: <span th:text="${#temporals.format(publication.updatedAt, 'MMM dd, yyyy')}">Jan 02, 2024</span>
          </span>
        </p>
      </div>
      <div class="flex gap-2 ml-4">
        <a th:href="${publication.url}" class="px-3 py-1 rounded border hover:bg-gray-100 text-sm" target="_blank" rel="noopener noreferrer">
          View
        </a>
        <a th:href="@{/admin/publications/{id}/edit(id=${publication.id})}" class="px-3 py-1 rounded border hover:bg-gray-100 text-sm">
          Edit
        </a>
        <form th:action="@{/admin/publications/{id}/delete(id=${publication.id})}" method="post" class="inline" onsubmit="return confirm('Are you sure you want to delete this publication?');">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="px-3 py-1 rounded border border-red-300 text-red-600 hover:bg-red-50 text-sm">
            Delete
          </button>
        </form>
      </div>
    </div>
  </div>

  <div th:if="${publicationsPage.totalPages > 1}" class="mt-6 flex justify-center gap-2">
    <a th:if="${publicationsPage.number > 0}"
       th:href="@{/admin/publications/list(page=${publicationsPage.number - 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Previous
    </a>
    <span class="px-4 py-2">
      Page <span th:text="${publicationsPage.number + 1}">1</span> of <span th:text="${publicationsPage.totalPages}">1</span>
    </span>
    <a th:if="${publicationsPage.hasNext()}"
       th:href="@{/admin/publications/list(page=${publicationsPage.number + 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Next
    </a>
  </div>
</section>
</html>
