<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header(${link.id != null ? 'Edit Link' : 'New Link'}, ~{::section})}">
<section>
  <div class="mb-6">
    <h1 class="text-3xl font-bold" th:text="${link.id != null ? 'Edit Link' : 'New Link'}">Edit Link</h1>
    <p class="text-gray-600">Add a link and the small description shown underneath it.</p>
  </div>

  <form th:action="${link.id != null ? '/admin/links/' + link.id + '/edit' : '/admin/links/new'}"
        method="post"
        class="space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label for="url" class="block text-sm font-semibold mb-2">Link</label>
      <input type="url"
             id="url"
             name="url"
             th:value="${link.url}"
             required
             placeholder="https://example.com"
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />
    </div>

    <div>
      <label for="description" class="block text-sm font-semibold mb-2">Description</label>
      <input type="text"
             id="description"
             name="description"
             th:value="${link.description}"
             placeholder="Short text shown under the link"
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black" />
    </div>

    <div class="flex gap-3 justify-end pt-2">
      <a th:href="@{/admin/links/list}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 rounded-lg bg-black text-white hover:bg-gray-800">
        Save
      </button>
    </div>
  </form>
</section>
</html>
