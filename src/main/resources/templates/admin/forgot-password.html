<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Forgot Password', ~{::section})}">
<section class="flex items-center justify-center min-h-[70vh]">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-6">
      Reset Password
    </h1>

    <!-- Success message -->
    <div th:if="${message != null && messageType == 'success'}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 text-sm">
      <span th:text="${message}"></span>
    </div>

    <!-- Error message -->
    <div th:if="${message != null && messageType == 'error'}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm">
      <span th:text="${message}"></span>
    </div>

    <p class="text-sm text-gray-600 mb-6">
      Click the button below to generate a password reset link. The link will be sent to your server console logs.
    </p>

    <form th:action="@{/gabo-secure-admin-2024/forgot-password}" method="post" class="space-y-5">

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Generate Reset Link
      </button>

      <div class="text-center">
        <a th:href="@{/gabo-secure-admin-2024}"
           class="text-sm text-blue-600 hover:underline">
          Back to Login
        </a>
      </div>

    </form>

  </div>

</section>
</html>
