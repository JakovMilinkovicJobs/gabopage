<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{minimal-header :: minimal-header('Add Project', ~{::section})}">
<section class="max-w-3xl mx-auto">

  <div class="mb-6">
    <h1 class="text-3xl font-bold">Add New Project</h1>
    <p class="text-gray-600">Create a new project.</p>
  </div>

  <div class="bg-white shadow rounded-2xl p-6">
    <div th:replace="~{admin/project-form :: projectForm(
        ${project},
        '/admin/projects/new',
        'Create Project',
        '/admin/dashboard'
    )}"></div>
  </div>

</section>
</html>
