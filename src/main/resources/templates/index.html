<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{minimal-header :: minimal-header('Home', ~{::section})}">
<section>

  <div class="hero bg-base-100 rounded-2xl shadow">
    <div class="hero-content text-center py-16">
      <div class="max-w-xl">
        <h1 class="text-4xl font-bold">Exploring Science, One Project at a Time</h1>
        <p class="py-4 opacity-80">A showcase of exciting science projects.</p>
        <a class="btn btn-primary" th:href="@{/projects}">View Projects</a>
      </div>
    </div>
  </div>

  <h2 class="text-2xl font-bold mt-10 mb-4">Featured Projects</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div th:each="project : ${projects}" class="card bg-base-100 shadow">
      <figure>
        <img th:src="${project.imageUrl}" alt="" class="h-48 w-full object-cover"/>
      </figure>
      <div class="card-body">
        <h3 class="card-title" th:text="${project.title}">Title</h3>
        <p th:text="${project.shortDescription}"></p>
        <div class="card-actions justify-end">
          <a class="btn btn-link" th:href="@{'/projects/' + ${project.id}}">Read more →</a>
        </div>
      </div>
    </div>
  </div>

</section>
</html>
