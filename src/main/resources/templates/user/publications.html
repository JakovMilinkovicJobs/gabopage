<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header('Publications', ~{::section})}">
<section>
  <div class="mb-8">
    <h1 class="text-4xl font-bold mb-2">Publications</h1>
    <p class="text-gray-600">Research papers and published works.</p>
  </div>

  <div th:if="${publications.isEmpty()}" class="text-center py-12 text-gray-500">
    <p>No publications available yet.</p>
  </div>

  <table class="topics-table" th:if="${!publications.isEmpty()}">
    <tbody>
      <tr th:each="publication : ${publications}">
        <td class="topic-title-cell">
          <a th:href="${publication.url}" th:text="${publication.title}" target="_blank" rel="noopener noreferrer">Publication Title</a>
        </td>
        <td class="topic-date-cell" th:text="${#temporals.format(publication.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</td>
      </tr>
    </tbody>
  </table>

  <div th:if="${totalPages > 1}" class="mt-6 flex justify-center gap-2">
    <a th:if="${currentPage > 0}"
       th:href="@{/publications(page=${currentPage - 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Previous
    </a>
    <span class="px-4 py-2">
      Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
    </span>
    <a th:if="${hasMore}"
       th:href="@{/publications(page=${currentPage + 1})}"
       class="px-4 py-2 rounded border hover:bg-gray-50">
      Next
    </a>
  </div>
</section>
</html>
