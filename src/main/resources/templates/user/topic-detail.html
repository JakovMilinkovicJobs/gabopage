<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{shared/minimal-header :: minimal-header(${topic.title}, ~{::section})}">
<section class="topic-detail-shell">
  <div class="max-w-4xl mx-auto">
    <a th:href="@{/blog}" class="text-sm text-gray-600 hover:text-gray-900 mb-4 inline-block">← Back to Blog</a>

    <h1 class="text-4xl font-bold mb-4" th:text="${topic.title}">Topic Title</h1>

    <div class="text-gray-600 mb-6" th:text="${#temporals.format(topic.createdAt, 'MMMM dd, yyyy')}">Date</div>

    <img th:if="${topic.coverImage != null}"
         th:src="@{/blog/topics/{id}/cover-image(id=${topic.id})}"
         alt="Cover image"
         class="w-full rounded-xl mb-8" />

    <div class="rich-content" th:utext="${topic.richHtml}"></div>
  </div>
</section>
</html>
