<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en"
      th:fragment="minimal-header(title, content)">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">Gabriel Marvin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" th:href="@{/css/app.css}" />

</head>

<body>

<header class="site-width py-8 flex items-center justify-between">
  <div class="text-2xl font-semibold">
    <a th:href="@{/}" class="hover:no-underline">Gabriel Marvin</a>
  </div>

  <nav class="flex items-center gap-6">
    <ul class="flex gap-6 text-lg">
      <li>
        <a th:href="@{/blog}"
           th:classappend="${activePage == 'blog'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Blog
        </a>
      </li>
      <li>
        <a href="/blog#topics"
           th:classappend="${activePage == 'topics'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Topics
        </a>
      </li>
      <li>
        <a th:href="@{/publications}"
           th:classappend="${activePage == 'publications'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Publications
        </a>
      </li>
      <li>
        <a th:href="@{/links}"
           th:classappend="${activePage == 'links'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Links
        </a>
      </li>
    </ul>

    <!-- Admin Edit Buttons (only visible when logged in as admin) -->
    <div sec:authorize="hasRole('ADMIN')" class="flex gap-3 ml-4 border-l pl-4">
      <a th:href="@{/admin/blog/edit}"
         class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition">
        Edit Blog
      </a>
      <a th:href="@{/admin/topics/list}"
         class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition">
        Manage Topics
      </a>
      <a th:href="@{/admin/publications/list}"
         class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition">
        Manage Publications
      </a>
      <a th:href="@{/logout}"
         class="px-3 py-1 bg-gray-600 text-white text-sm rounded hover:bg-gray-700 transition">
        Logout
      </a>
    </div>
  </nav>
</header>

<main class="site-width pb-20">
  <div th:replace="${content}"></div>
</main>

</body>
</html>
