<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en"
      th:fragment="layout(title, content)">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">Science Projects</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Optional “prebuilt styles” layer (DaisyUI) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>

<body class="bg-base-200 text-base-content">

<nav class="navbar bg-base-100 shadow">
  <div class="flex-1">
    <a class="btn btn-ghost text-xl" th:href="@{/}">Science Projects</a>
  </div>

  <div class="flex-none gap-2">
    <a class="btn btn-ghost" th:href="@{/projects}">Projects</a>
    <a class="btn btn-ghost" th:href="@{/about}">About</a>
    <a class="btn btn-ghost" th:href="@{/blog}">Blog</a>
<!--    <li class="opacity-50">•</li>-->
<!--    <li>-->
      <a class="btn btn-ghost" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/blog/edit}">
        Edit Blog
      </a>
<!--    </li>-->

    <!-- admin-only -->
    <a class="btn btn-primary"
       sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/dashboard}">
      Dashboard
    </a>

    <!-- auth -->
    <a class="btn"
       sec:authorize="isAnonymous()"
       th:href="@{/login}">
      Login
    </a>

    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
      <button class="btn btn-outline" type="submit">Logout</button>
    </form>
  </div>
</nav>

<main class="max-w-6xl mx-auto p-6">
  <div th:replace="${content}"></div>
</main>

</body>
</html>
