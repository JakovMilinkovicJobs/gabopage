<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!--
  Reusable Quill Rich Text Editor Fragment

  Usage in your template:
  1. Include CDN resources ONCE in the page:
     <div th:replace="~{fragments/quill-editor :: quill-resources}"></div>

  2. Add the editor div and textarea in your form:
     <div id="editor" class="border rounded-xl min-h-[520px] bg-white"></div>
     <textarea name="richHtml" id="richHtml" class="hidden" th:text="${yourContent}"></textarea>

  3. Initialize at the end of the page:
     <script th:inline="javascript">
       /*<![CDATA[*/
       [[${@quillEditorInit.initScript('editor', 'richHtml', 'form')}]]
       /*]]>*/
     </script>

     OR use th:replace for the script:
     <div th:replace="~{fragments/quill-editor :: quill-script}"></div>
-->

<!-- CDN Resources - Include once per page -->
<th:block th:fragment="quill-resources">
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
</th:block>

<!-- Initialization Script -->
<script th:fragment="quill-script">
  // Register image resize module
  Quill.register('modules/imageResize', ImageResize);

  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image'],
        ['blockquote', 'code-block'],
        [{ 'color': [] }, { 'background': [] }],
        ['clean']
      ],
      imageResize: {
        displaySize: true,
        modules: ['Resize', 'DisplaySize']
      }
    }
  });

  quill.root.classList.add('rich-content');

  // Custom image handler
  quill.getModule('toolbar').addHandler('image', function() {
    const input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'image/*');
    input.click();

    input.onchange = async () => {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const range = quill.getSelection(true);
          quill.insertEmbed(range.index, 'image', e.target.result);
          quill.setSelection(range.index + 1);
        };
        reader.readAsDataURL(file);
      }
    };
  });

  // Load initial content
  const initial = document.getElementById('richHtml').value;
  if (initial) {
    quill.root.innerHTML = initial;
  }

  // Save on form submit
  document.querySelector('form').addEventListener('submit', () => {
    document.getElementById('richHtml').value = quill.root.innerHTML;
  });

  // Add tooltips to toolbar buttons
  const toolbarTooltips = {
    '.ql-header[value="1"]': 'Heading 1',
    '.ql-header[value="2"]': 'Heading 2',
    '.ql-header[value="3"]': 'Heading 3',
    '.ql-header[value=""]': 'Normal text',
    '.ql-bold': 'Bold',
    '.ql-italic': 'Italic',
    '.ql-underline': 'Underline',
    '.ql-strike': 'Strikethrough',
    '.ql-list[value="ordered"]': 'Numbered list',
    '.ql-list[value="bullet"]': 'Bullet list',
    '.ql-align .ql-picker-label': 'Text alignment',
    '.ql-link': 'Insert link',
    '.ql-image': 'Insert image',
    '.ql-blockquote': 'Quote',
    '.ql-code-block': 'Code block',
    '.ql-color .ql-picker-label': 'Text color',
    '.ql-background .ql-picker-label': 'Background color',
    '.ql-clean': 'Remove formatting'
  };

  Object.keys(toolbarTooltips).forEach(selector => {
    const element = document.querySelector(selector);
    if (element) {
      element.setAttribute('title', toolbarTooltips[selector]);
    }
  });
</script>

</html>
