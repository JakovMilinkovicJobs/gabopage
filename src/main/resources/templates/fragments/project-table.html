<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  projectTable(projectPage, size, baseUrl, isAdmin)

  - projectPage: Page<Project>
  - size: int
  - baseUrl: String (e.g. "/projects" or "/admin/dashboard")
  - isAdmin: boolean
-->
<div th:fragment="projectTable(projectPage, size, baseUrl, isAdmin)">

  <!-- Top row: page size dropdown + totals -->
<!--  <div class="flex items-center justify-between mb-4">-->
<!--    <form method="get" th:action="@{${baseUrl}}">-->

<!--      <label>-->

<!--                class="border rounded px-2 py-1"-->
<!--                onchange="this.form.submit()">-->
<!--          <option th:value="5"  th:selected="${size == 5}">5</option>-->
<!--          <option th:value="10" th:selected="${size == 10}">10</option>-->

<!--        </select>-->
<!--      </label>-->

<!--      &lt;!&ndash; When size changes, reset to first page &ndash;&gt;-->

<!--    </form>-->

<!--    <div class="text-sm text-gray-600"-->
<!--         th:text="'Total: ' + ${projectPage.totalElements}">-->
<!--    </div>-->
<!--  </div>-->

  <!-- Table -->
  <div class="bg-white shadow rounded overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-100">
      <tr>
        <th th:if="${isAdmin}" class="p-3">ID</th>
        <th class="p-3">Title</th>
        <th class="p-3 text-center w-24">#Files</th>
        <th class="p-3 w-56 text-center">Actions</th>
      </tr>
      </thead>

      <tbody id="projectRows">
      <tr th:each="p : ${projectPage.content}" class="border-t">
        <td th:if="${isAdmin}" class="p-3" th:text="${p.id}">1</td>
        <td class="p-3" th:text="${p.title}">Project title</td>
        <td class="p-3 text-center"
            th:text="${p.files == null ? 0 : #lists.size(p.files)}">0</td>
        <td class="p-3 text-center">
          <div class="flex justify-center gap-2">
            <a class="inline-block bg-blue-500 px-3 py-1 rounded border"
               th:href="@{/projects/{id}(id=${p.id})}">Details</a>

            <a th:if="${isAdmin}"
               class="inline-block bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600"
               th:href="@{/admin/projects/{id}/edit(id=${p.id})}">Edit</a>

            <form th:if="${isAdmin}"
                  th:action="@{/admin/projects/{id}/delete(id=${p.id})}"
                  method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit"
                      class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700"
                      onclick="return confirm('Delete this project?')">Delete</button>
            </form>
          </div>
        </td>
      </tr>

      <tr th:if="${projectPage.totalElements == 0}">
        <td colspan="4" class="p-6 text-center text-gray-500">No projects found.</td>
      </tr>
      </tbody>

      <!-- rows-only fragment for infinite scroll -->
      <th:block th:fragment="projectRows(projectPage, isAdmin)">
        <tr th:each="p : ${projectPage.content}" class="border-t">
          <td th:if="${isAdmin}" class="p-3" th:text="${p.id}">1</td>
          <td class="p-3" th:text="${p.title}">Project title</td>
          <td class="p-3 text-center"
              th:text="${p.files == null ? 0 : #lists.size(p.files)}">0</td>
          <td class="p-3 text-center">
            <div class="flex justify-center gap-2">
              <a class="inline-block bg-blue-500 px-3 py-1 rounded border"
                 th:href="@{/projects/{id}(id=${p.id})}">Details</a>

              <a th:if="${isAdmin}"
                 class="inline-block bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600"
                 th:href="@{/admin/projects/{id}/edit(id=${p.id})}">Edit</a>

              <form th:if="${isAdmin}"
                    th:action="@{/admin/projects/{id}/delete(id=${p.id})}"
                    method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit"
                        class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700"
                        onclick="return confirm('Delete this project?')">Delete</button>
              </form>
            </div>
          </td>
        </tr>
      </th:block>
    </table>
  </div>

  <!-- Pagination -->
<!--  <div class="mt-6 flex items-center justify-between">-->

<!--         th:href="@{${baseUrl}(page=${projectPage.number - 1}, size=${size})}">-->
<!--        Prev-->
<!--      </a>-->

<!--      <a class="px-3 py-2 rounded border"-->
<!--         th:classappend="${projectPage.last} ? ' opacity-50 pointer-events-none' : ''"-->
<!--         th:href="@{${baseUrl}(page=${projectPage.number + 1}, size=${size})}">-->
<!--        Next-->
<!--      </a>-->
<!--    </div>-->
<!--  </div>-->

</div>

</body>
</html>
