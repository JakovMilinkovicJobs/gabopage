<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="grid(projects)">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    <div th:each="project : ${projects}" class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition">
      <img th:src="${project.imageUrl}" alt="" class="w-full h-56 object-cover">
      <div class="p-6">
        <h3 class="text-xl font-semibold mb-2" th:text="${project.title}">Project Title</h3>
        <p class="text-gray-600 mb-4" th:text="${project.shortDescription}">Short project description goes here.</p>
        <a th:href="@{'/projects/' + ${project.id}}" class="text-blue-600 font-medium hover:underline">
          Read more →
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
