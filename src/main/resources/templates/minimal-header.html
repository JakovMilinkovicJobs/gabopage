<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en"
      th:fragment="minimal-header(title, content)">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">Gabriel Marvin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" th:href="@{/css/app.css}" />

</head>

<body>

<header class="max-w-5xl mx-auto px-6 py-8 flex items-center justify-between">
  <div class="text-2xl font-semibold">
    <a th:href="@{/}" class="hover:no-underline">Gabriel Marvin</a>
  </div>

  <nav>
    <ul class="flex gap-6 text-lg">
      <li>
        <a th:href="@{/blog}"
           th:classappend="${activePage == 'blog'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Blog
        </a>
      </li>
      <li>
        <a th:href="@{/projects}"
           th:classappend="${activePage == 'projects'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Projects
        </a>
      </li>
      <li>
        <a th:href="@{/publications}"
           th:classappend="${activePage == 'publications'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Publications
        </a>
      </li>
      <li>
        <a th:href="@{/links}"
           th:classappend="${activePage == 'links'} ? ' text-black font-semibold' : ' text-gray-500 hover:text-black'">
          Links
        </a>
      </li>
    </ul>
  </nav>
</header>

<main class="max-w-5xl mx-auto px-6 pb-20">
  <div th:replace="${content}"></div>
</main>

</body>
</html>
